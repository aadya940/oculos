name: build-orbit-wheels

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build OculOS binary
        run: |
          cd oculos
          cargo build --release
        shell: bash

      - name: Stage OculOS binary into orbit package
        run: |
          mkdir -p orbit/_bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp oculos/target/release/oculos.exe orbit/_bin/oculos.exe
          else
            cp oculos/target/release/oculos orbit/_bin/oculos
          fi
        shell: bash

      - name: Build Orbit wheel only
        run: python -m build --wheel

      # PyPI rejects bare linux_x86_64 / linux_aarch64 tags; require manylinux.
      - name: Install patchelf (Linux, for auditwheel)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Repair wheel for PyPI (manylinux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install auditwheel
          mkdir -p dist-repaired
          auditwheel repair dist/*.whl -w dist-repaired
          rm -f dist/*.whl
          mv dist-repaired/* dist/
          rmdir dist-repaired

      - name: Verify wheel is platform-specific (not none-any)
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")
          wheel = wheels[-1]
          name = wheel.name
          print(f"Built wheel: {name}")
          m = re.match(r".+-(?P<py>[^-]+)-(?P<abi>[^-]+)-(?P<plat>[^-]+)\.whl$", name)
          if not m:
              raise SystemExit(f"Could not parse wheel tag from: {name}")
          tag = f"{m.group('py')}-{m.group('abi')}-{m.group('plat')}"
          print(f"Wheel tag: {tag}")
          if m.group("abi") == "none" and m.group("plat") == "any":
              raise SystemExit(
                  "Wheel is pure Python (none-any) but package bundles native binaries."
              )
          PY

      - name: Install built wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test import and bundled binary
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import platform
          import orbit

          pkg_dir = pathlib.Path(orbit.__file__).resolve().parent
          bin_dir = pkg_dir / "_bin"
          if platform.system() == "Windows":
              expected = bin_dir / "oculos.exe"
          else:
              expected = bin_dir / "oculos"
          print(f"Checking bundled binary at: {expected}")
          if not expected.exists():
              raise SystemExit(f"Missing bundled OculOS binary: {expected}")
          if platform.system() != "Windows" and not os.access(expected, os.X_OK):
              raise SystemExit(f"Bundled OculOS binary is not executable: {expected}")
          print("Smoke test passed.")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    # Avoid publishing ad-hoc workflow_dispatch runs; only tag pushes (e.g. v0.1.0).
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
